services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - wp
      - pma
    networks:
      - wp-network

  wp:
    container_name: ini_wordpress
    image: wordpress:php8.2-apache
    build:
      context: .
    expose:
      - "80"
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: ${DB_USER}
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD}
      WORDPRESS_DB_NAME: ${DB_NAME}
    volumes:
      - wp_data:/var/www/html
    depends_on:
      - db
    networks:
      - wp-network
    restart: unless-stopped

  db:
    image: mariadb:10.11
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - wp-network
    restart: unless-stopped

  pma:
    container_name: ini_pma
    image: phpmyadmin:5-apache
    expose:
      - "80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    networks:
      - wp-network
    restart: unless-stopped

volumes:
  wp_data:
  db_data:

networks:
  wp-network:
    driver: bridge
